# Extra autostart processes
# exec-once = uwsm-app -- my-service
#
# Always enable laptop screen on startup
exec-once = sleep 2 && hyprctl keyword monitor "eDP-1,3200x2000@120,0x0,2"

# Dock health check - notifies if dock is connected but displays not detected
exec-once = ~/.local/bin/dock-health-check.sh

# --- Session Saver Integration ---
exec-once = hypr-session restore
